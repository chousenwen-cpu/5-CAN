
<!DOCTYPE html>

    <meta charset="UTF-8">

    <title>吾會念佛 心情日誌</title>
    <style>
        /* 基礎樣式設定 */
        body {
            font-family: "Microsoft JhengHei", "Apple LiGothic Medium", sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f9f9f9;
        }

        header.main-header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 2px solid #eee;
            margin-bottom: 30px;
        }

        /* 日誌容器 */
        #diary-container {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* 日誌卡片基本樣式 */
        .diary-entry {
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.2s;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .diary-entry:hover {
            transform: translateY(-5px);
        }

        /* 日期與星期樣式 */
        .entry-meta {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 10px;
            font-weight: bold;
        }

        /* 抬頭樣式 */
        .entry-title {
            margin: 0 0 15px 0;
            font-size: 1.5em;
            color: #2c3e50;
        }

        /* 內容樣式 */
        .entry-content {
            font-size: 1.1em;
            white-space: pre-wrap; /* 保留換行 */
        }

        /* --- 星期背景顏色定義 --- */
        /* 週一 (淺藍) */
        .diary-entry[data-day="1"] { background-color: #e3f2fd; border-left: 8px solid #2196f3; }
        /* 週二 (淺紅) */
        .diary-entry[data-day="2"] { background-color: #ffebee; border-left: 8px solid #f44336; }
        /* 週三 (淺綠) */
        .diary-entry[data-day="3"] { background-color: #e8f5e9; border-left: 8px solid #4caf50; }
        /* 週四 (淺黃) */
        .diary-entry[data-day="4"] { background-color: #fffde7; border-left: 8px solid #fbc02d; }
        /* 週五 (淺紫) */
        .diary-entry[data-day="5"] { background-color: #f3e5f5; border-left: 8px solid #9c27b0; }
        /* 週六 (淺橘) */
        .diary-entry[data-day="6"] { background-color: #fff3e0; border-left: 8px solid #ff9800; }
        /* 週日 (淡灰藍) */
        .diary-entry[data-day="7"] { background-color: #eceff1; border-left: 8px solid #607d8b; }

        footer {
            text-align: center;
            margin-top: 50px;
            padding: 20px;
            font-size: 0.8em;
            color: #aaa;
        }
    </style>
</head>
